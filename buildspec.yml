version: 0.2

phases:
  install:
    runtime-versions:
      docker: 20
  pre_build:
    commands:
      - echo Logging in to Amazon ECR (optional)
  build:
    commands:
      - echo Building Docker image...
      - docker build -t myapp .
      - echo Running container...
      - docker run myapp
  post_build:
    commands:
      - echo Build completed